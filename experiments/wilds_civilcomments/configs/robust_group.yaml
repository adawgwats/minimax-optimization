method: robust_group
dataset_root: data/wilds
output_dir: outputs/wilds_civilcomments/robust_group
model_name: distilbert-base-uncased
max_length: 256
train_batch_size: 16
eval_batch_size: 32
learning_rate: 1.0e-5
weight_decay: 0.01
num_train_epochs: 3
seed: 17
download: true
explicit_mnar: true
base_observation_rate: 0.95
toxic_penalty: 0.20
identity_penalty: 0.10
identity_toxic_interaction_penalty: 0.15
min_observation_rate: 0.05
